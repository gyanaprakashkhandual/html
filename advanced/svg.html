<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Mastery</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
      }
      code {
        font-family: "JetBrains Mono", monospace;
      }
    </style>
  </head>
  <body class="bg-white text-gray-900 min-h-screen">
    <header class="border-b border-gray-200 px-8 py-6">
      <div class="max-w-6xl mx-auto flex items-center gap-4">
        <span
          class="bg-emerald-400 text-gray-950 text-xs font-bold px-2 py-1 rounded"
          >ADVANCED</span
        >
        <h1 class="text-3xl font-bold">SVG — Scalable Vector Graphics</h1>
      </div>
    </header>
    <main class="max-w-6xl mx-auto px-8 py-12 space-y-16">
      <section>
        <h2
          class="text-emerald-500 text-xs font-bold tracking-widest uppercase mb-6"
        >
          Basic SVG Shapes
        </h2>
        <div class="bg-white border border-gray-200 rounded-xl p-6">
          <svg
            viewBox="0 0 800 200"
            xmlns="http://www.w3.org/2000/svg"
            class="w-full"
          >
            <rect
              x="20"
              y="40"
              width="120"
              height="120"
              rx="12"
              fill="#34d399"
              opacity="0.9"
            />
            <circle cx="250" cy="100" r="70" fill="#818cf8" opacity="0.9" />
            <ellipse
              cx="420"
              cy="100"
              rx="90"
              ry="50"
              fill="#f472b6"
              opacity="0.9"
            />
            <line
              x1="540"
              y1="40"
              x2="640"
              y2="160"
              stroke="#fbbf24"
              stroke-width="6"
              stroke-linecap="round"
            />
            <polyline
              points="680,160 700,40 720,120 740,60 760,160"
              fill="none"
              stroke="#60a5fa"
              stroke-width="3"
              stroke-linejoin="round"
            />
            <polygon
              points="580,40 620,160 540,160"
              fill="#f43f5e"
              opacity="0.9"
            />
            <text
              x="20"
              y="190"
              fill="#64748b"
              font-size="11"
              font-family="JetBrains Mono"
            >
              rect circle ellipse line polyline polygon
            </text>
          </svg>
        </div>
      </section>

      <section>
        <h2
          class="text-emerald-500 text-xs font-bold tracking-widest uppercase mb-6"
        >
          SVG Path — d attribute
        </h2>
        <div class="grid md:grid-cols-2 gap-6">
          <div class="bg-white border border-gray-200 rounded-xl p-6">
            <p class="text-gray-600 text-xs mb-3">
              M=Move, L=Line, C=Cubic bezier, Q=Quad bezier, A=Arc, Z=Close
            </p>
            <svg
              viewBox="0 0 400 250"
              xmlns="http://www.w3.org/2000/svg"
              class="w-full"
            >
              <path
                d="M 30 200 L 130 50 L 230 200 Z"
                fill="#f472b6"
                opacity="0.8"
              />
              <path
                d="M 260 200 C 260 100, 380 100, 380 200"
                fill="none"
                stroke="#34d399"
                stroke-width="4"
              />
              <path
                d="M 20 130 Q 100 20 180 130"
                fill="none"
                stroke="#818cf8"
                stroke-width="4"
              />
              <path
                d="M 210 100 A 60 40 0 0 1 330 100"
                fill="none"
                stroke="#fbbf24"
                stroke-width="4"
                stroke-dasharray="10 5"
              />
              <path
                d="M 20 220 C 80 180, 150 260, 220 220 S 340 180, 380 220"
                fill="none"
                stroke="#60a5fa"
                stroke-width="3"
              />
            </svg>
          </div>
          <div class="bg-white border border-gray-200 rounded-xl p-6">
            <p class="text-gray-600 text-xs mb-3">
              Complex path — SVG icon/logo quality
            </p>
            <svg
              viewBox="0 0 400 250"
              xmlns="http://www.w3.org/2000/svg"
              class="w-full"
            >
              <defs>
                <linearGradient
                  id="svgGrad"
                  x1="0%"
                  y1="0%"
                  x2="100%"
                  y2="100%"
                >
                  <stop offset="0%" stop-color="#34d399" />
                  <stop offset="100%" stop-color="#818cf8" />
                </linearGradient>
              </defs>
              <path
                d="M200 20 L240 90 L320 90 L260 140 L280 220 L200 175 L120 220 L140 140 L80 90 L160 90 Z"
                fill="url(#svgGrad)"
                opacity="0.9"
              />
              <path
                d="M200 55 L224 100 L274 100 L235 128 L249 178 L200 150 L151 178 L165 128 L126 100 L176 100 Z"
                fill="#0f172a"
                opacity="0.5"
              />
            </svg>
          </div>
        </div>
      </section>

      <section>
        <h2
          class="text-emerald-500 text-xs font-bold tracking-widest uppercase mb-6"
        >
          SVG Filters & Effects
        </h2>
        <div class="bg-white border border-gray-200 rounded-xl p-6">
          <svg
            viewBox="0 0 800 220"
            xmlns="http://www.w3.org/2000/svg"
            class="w-full"
          >
            <defs>
              <filter id="blur"><feGaussianBlur stdDeviation="8" /></filter>
              <filter id="shadow">
                <feDropShadow
                  dx="4"
                  dy="4"
                  stdDeviation="6"
                  flood-color="#818cf8"
                  flood-opacity="0.8"
                />
              </filter>
              <filter id="glow">
                <feGaussianBlur stdDeviation="6" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
              <filter id="turbulence">
                <feTurbulence
                  type="turbulence"
                  baseFrequency="0.02"
                  numOctaves="2"
                />
                <feDisplacementMap in="SourceGraphic" scale="20" />
              </filter>
            </defs>
            <rect
              x="30"
              y="40"
              width="140"
              height="140"
              rx="8"
              fill="#34d399"
              filter="url(#blur)"
            />
            <text
              x="100"
              y="195"
              text-anchor="middle"
              fill="#64748b"
              font-size="11"
              font-family="JetBrains Mono"
            >
              blur
            </text>
            <rect
              x="210"
              y="40"
              width="140"
              height="140"
              rx="8"
              fill="#818cf8"
              filter="url(#shadow)"
            />
            <text
              x="280"
              y="195"
              text-anchor="middle"
              fill="#64748b"
              font-size="11"
              font-family="JetBrains Mono"
            >
              dropshadow
            </text>
            <circle
              cx="490"
              cy="110"
              r="70"
              fill="#f472b6"
              filter="url(#glow)"
            />
            <text
              x="490"
              y="195"
              text-anchor="middle"
              fill="#64748b"
              font-size="11"
              font-family="JetBrains Mono"
            >
              glow
            </text>
            <rect
              x="610"
              y="40"
              width="140"
              height="140"
              rx="8"
              fill="#fbbf24"
              filter="url(#turbulence)"
            />
            <text
              x="680"
              y="195"
              text-anchor="middle"
              fill="#64748b"
              font-size="11"
              font-family="JetBrains Mono"
            >
              turbulence
            </text>
          </svg>
        </div>
      </section>

      <section>
        <h2
          class="text-emerald-500 text-xs font-bold tracking-widest uppercase mb-6"
        >
          SVG Animations (SMIL)
        </h2>
        <div class="bg-white border border-gray-200 rounded-xl p-6">
          <svg
            viewBox="0 0 800 200"
            xmlns="http://www.w3.org/2000/svg"
            class="w-full"
          >
            <circle cx="100" cy="100" r="50" fill="#34d399">
              <animate
                attributeName="r"
                values="30;60;30"
                dur="2s"
                repeatCount="indefinite"
              />
              <animate
                attributeName="opacity"
                values="1;0.3;1"
                dur="2s"
                repeatCount="indefinite"
              />
            </circle>
            <rect x="230" y="60" width="80" height="80" rx="8" fill="#818cf8">
              <animateTransform
                attributeName="transform"
                type="rotate"
                values="0 270 100;360 270 100"
                dur="3s"
                repeatCount="indefinite"
              />
            </rect>
            <rect x="380" y="80" width="0" height="40" rx="4" fill="#f472b6">
              <animate
                attributeName="width"
                values="0;120;0"
                dur="2s"
                repeatCount="indefinite"
              />
            </rect>
            <circle cx="620" cy="100" r="20" fill="#fbbf24">
              <animateMotion dur="4s" repeatCount="indefinite">
                <mpath>
                  <path d="M-100 0 C -50 -80, 50 -80, 100 0 S 150 80, 200 0" />
                </mpath>
              </animateMotion>
            </circle>
            <text
              x="90"
              y="180"
              text-anchor="middle"
              fill="#64748b"
              font-size="10"
              font-family="JetBrains Mono"
            >
              pulse
            </text>
            <text
              x="270"
              y="180"
              text-anchor="middle"
              fill="#64748b"
              font-size="10"
              font-family="JetBrains Mono"
            >
              rotate
            </text>
            <text
              x="440"
              y="180"
              text-anchor="middle"
              fill="#64748b"
              font-size="10"
              font-family="JetBrains Mono"
            >
              width
            </text>
            <text
              x="620"
              y="180"
              text-anchor="middle"
              fill="#64748b"
              font-size="10"
              font-family="JetBrains Mono"
            >
              motion
            </text>
          </svg>
        </div>
      </section>

      <section>
        <h2
          class="text-emerald-500 text-xs font-bold tracking-widest uppercase mb-6"
        >
          SVG Patterns & Masks
        </h2>
        <div class="bg-white border border-gray-200 rounded-xl p-6">
          <svg
            viewBox="0 0 800 200"
            xmlns="http://www.w3.org/2000/svg"
            class="w-full"
          >
            <defs>
              <pattern
                id="dots"
                x="0"
                y="0"
                width="20"
                height="20"
                patternUnits="userSpaceOnUse"
              >
                <circle cx="10" cy="10" r="4" fill="#34d399" opacity="0.6" />
              </pattern>
              <pattern
                id="stripes"
                x="0"
                y="0"
                width="20"
                height="20"
                patternUnits="userSpaceOnUse"
                patternTransform="rotate(45)"
              >
                <rect
                  x="0"
                  y="0"
                  width="10"
                  height="20"
                  fill="#818cf8"
                  opacity="0.6"
                />
              </pattern>
              <mask id="textMask">
                <text
                  x="550"
                  y="160"
                  font-size="140"
                  font-family="Space Grotesk"
                  font-weight="700"
                  fill="white"
                >
                  SVG
                </text>
              </mask>
              <linearGradient id="maskGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f472b6" />
                <stop offset="50%" stop-color="#fbbf24" />
                <stop offset="100%" stop-color="#34d399" />
              </linearGradient>
            </defs>
            <rect
              x="20"
              y="20"
              width="200"
              height="160"
              rx="12"
              fill="url(#dots)"
              stroke="#e5e7eb"
              stroke-width="1"
            />
            <text
              x="120"
              y="195"
              text-anchor="middle"
              fill="#64748b"
              font-size="11"
              font-family="JetBrains Mono"
            >
              dots pattern
            </text>
            <rect
              x="250"
              y="20"
              width="200"
              height="160"
              rx="12"
              fill="url(#stripes)"
              stroke="#e5e7eb"
              stroke-width="1"
            />
            <text
              x="350"
              y="195"
              text-anchor="middle"
              fill="#64748b"
              font-size="11"
              font-family="JetBrains Mono"
            >
              stripes pattern
            </text>
            <rect
              x="480"
              y="10"
              width="300"
              height="175"
              fill="url(#maskGrad)"
              mask="url(#textMask)"
            />
            <text
              x="630"
              y="195"
              text-anchor="middle"
              fill="#64748b"
              font-size="11"
              font-family="JetBrains Mono"
            >
              text mask
            </text>
          </svg>
        </div>
      </section>

      <section>
        <h2
          class="text-emerald-500 text-xs font-bold tracking-widest uppercase mb-6"
        >
          Interactive SVG Chart
        </h2>
        <div class="bg-white border border-gray-200 rounded-xl p-6">
          <svg
            id="barChart"
            viewBox="0 0 800 300"
            xmlns="http://www.w3.org/2000/svg"
            class="w-full"
          ></svg>
          <script>
            const data = [
              { label: "Jan", value: 65 },
              { label: "Feb", value: 80 },
              { label: "Mar", value: 55 },
              { label: "Apr", value: 90 },
              { label: "May", value: 75 },
              { label: "Jun", value: 95 },
              { label: "Jul", value: 70 },
              { label: "Aug", value: 85 },
            ];
            const svg = document.getElementById("barChart");
            const W = 800,
              H = 300,
              pad = 50,
              maxVal = 100;
            const barW = (W - pad * 2) / data.length - 10;
            data.forEach((d, i) => {
              const x = pad + i * ((W - pad * 2) / data.length) + 5;
              const barH = ((H - pad * 2) * d.value) / maxVal;
              const y = H - pad - barH;
              const colors = [
                "#34d399",
                "#818cf8",
                "#f472b6",
                "#fbbf24",
                "#60a5fa",
                "#f43f5e",
                "#a78bfa",
                "#34d399",
              ];
              const rect = document.createElementNS(
                "http://www.w3.org/2000/svg",
                "rect",
              );
              rect.setAttribute("x", x);
              rect.setAttribute("y", H - pad);
              rect.setAttribute("width", barW);
              rect.setAttribute("height", 0);
              rect.setAttribute("rx", 6);
              rect.setAttribute("fill", colors[i]);
              rect.setAttribute("opacity", "0.85");
              rect.style.cursor = "pointer";
              rect.style.transition = "opacity 0.2s";
              rect.addEventListener("mouseover", () =>
                rect.setAttribute("opacity", "1"),
              );
              rect.addEventListener("mouseout", () =>
                rect.setAttribute("opacity", "0.85"),
              );
              svg.appendChild(rect);
              setTimeout(() => {
                rect.setAttribute("y", y);
                rect.setAttribute("height", barH);
                rect.style.transition =
                  "y 0.6s ease, height 0.6s ease, opacity 0.2s";
              }, i * 80);
              const text = document.createElementNS(
                "http://www.w3.org/2000/svg",
                "text",
              );
              text.setAttribute("x", x + barW / 2);
              text.setAttribute("y", H - pad + 20);
              text.setAttribute("text-anchor", "middle");
              text.setAttribute("fill", "#64748b");
              text.setAttribute("font-size", "12");
              text.setAttribute("font-family", "JetBrains Mono");
              text.textContent = d.label;
              svg.appendChild(text);
              const val = document.createElementNS(
                "http://www.w3.org/2000/svg",
                "text",
              );
              val.setAttribute("x", x + barW / 2);
              val.setAttribute("y", y - 6);
              val.setAttribute("text-anchor", "middle");
              val.setAttribute("fill", colors[i]);
              val.setAttribute("font-size", "12");
              val.setAttribute("font-family", "JetBrains Mono");
              val.setAttribute("font-weight", "700");
              val.textContent = d.value;
              svg.appendChild(val);
              const line = document.createElementNS(
                "http://www.w3.org/2000/svg",
                "line",
              );
              line.setAttribute("x1", pad);
              line.setAttribute("x2", W - pad);
              line.setAttribute("y1", H - pad);
              line.setAttribute("y2", H - pad);
              line.setAttribute("stroke", "#e5e7eb");
              line.setAttribute("stroke-width", "1");
              svg.appendChild(line);
            });
          </script>
        </div>
      </section>
    </main>
  </body>
</html>
